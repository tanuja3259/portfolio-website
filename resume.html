<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — Tanuja Bhatt</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .resume-page {
      flex: 1; position: relative; z-index: 1;
      padding: calc(var(--nav-h) + 60px) 40px 80px;
      max-width: 1100px; margin: auto; width: 100%;
    }
    .resume-header { margin-bottom: 36px; }
    .resume-header .section-label { margin-bottom: 12px; }
    .resume-header h1 {
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700; letter-spacing: -.02em;
    }
    .resume-header h1 span { color: var(--accent); }
    .resume-actions {
      display: flex; flex-wrap: wrap; gap: 14px; margin-top: 28px;
    }
    .resume-frame {
      width: 100%; height: 85vh; border: none;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: white;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    @media (max-width: 640px) { .resume-frame { height: 70vh; } .resume-page { padding-left: 20px; padding-right: 20px; } }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<header id="navbar">
  <nav class="nav-inner">
    <a href="index.html" class="nav-logo">
      <span class="logo-bracket">&lt;</span>TB<span class="logo-bracket">/&gt;</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html#about" class="nav-link">About</a></li>
      <li><a href="index.html#skills" class="nav-link">Skills</a></li>
      <li><a href="index.html#projects" class="nav-link">Projects</a></li>
      <li><a href="index.html#contact" class="nav-link">Contact</a></li>
    </ul>
    <a href="resume_tanuja.pdf" download class="nav-cta"><i class="fas fa-download"></i> Download</a>
  </nav>
</header>

<div class="resume-page">
  <div class="resume-header reveal">
    <div class="section-label">resume</div>
    <h1>My <span>Resume</span></h1>
    <p style="color:var(--muted);margin-top:10px;">B.Tech CSE · Graphic Era University · Graduating 2027</p>
    <div class="resume-actions">
      <a href="index.html" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
      <a href="resume_tanuja.pdf" download class="btn btn-primary"><i class="fas fa-download"></i> Download PDF</a>
    </div>
  </div>
  <object data="resume_tanuja.pdf" type="application/pdf" class="resume-frame reveal">
    <div style="text-align:center;padding:60px;color:var(--muted);">
      <i class="fas fa-file-pdf" style="font-size:3rem;color:var(--accent);margin-bottom:16px;display:block;"></i>
      <p>Your browser doesn't support inline PDF viewing.</p>
      <a href="resume_tanuja.pdf" download class="btn btn-primary" style="margin-top:20px;display:inline-flex;">Download Resume</a>
    </div>
  </object>
</div>

<footer>
  <div class="footer-inner">
    <span class="footer-logo"><span class="logo-bracket">&lt;</span>TB<span class="logo-bracket">/&gt;</span></span>
    <p>© 2026 Tanuja Bhatt</p>
    <a href="#" class="back-top"><i class="fas fa-arrow-up"></i></a>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
